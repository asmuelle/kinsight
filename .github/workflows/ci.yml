name: ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up just
        uses: extractions/setup-just@v2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check bootstrap status
        id: guard
        run: |
          if [ -x ./gradlew ]; then
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
            echo "::notice::gradlew missing — scaffold-only commit; skipping 'just ci' until the Gradle project is bootstrapped (see DESIGN.md M0)."
          fi

      - name: just ci (lint + build + test)
        if: steps.guard.outputs.bootstrapped == 'true'
        run: just ci
